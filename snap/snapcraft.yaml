name: bhadrakote
base: core22
version: "0.1.0"
summary: SSH Bastion — secure tunnel & port-forward manager
description: |
  Bhadrakote is a desktop app for managing SSH tunnels through bastion/jump
  hosts. Save connection profiles, configure port-forwarding rules, and
  connect or disconnect with a single click.

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  bhadrakote:
    command: usr/bin/bhadrakote
    desktop: usr/share/applications/bhadrakote.desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - home
      - ssh-keys

parts:
  bhadrakote:
    plugin: nil
    source: .
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - libwebkit2gtk-4.0-dev
      - libappindicator3-dev
      - librsvg2-dev
      - patchelf
      - file
      - libssl-dev
      - libgtk-3-dev
      - dpkg
    stage-packages:
      - libwebkit2gtk-4.0-37
      - libgtk-3-0
      - openssh-client
    override-build: |
      set -eu

      # Set up Rust stable toolchain (rustup snap needs initialization)
      rustup default stable

      # Install frontend dependencies and build the Tauri app
      npm ci
      npm run tauri build -- --bundles deb

      # Extract the .deb into the snap install tree
      dpkg-deb -x src-tauri/target/release/bundle/deb/*.deb "$CRAFT_PART_INSTALL/"
