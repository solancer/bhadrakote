name: bhadrakote
base: core22
version: "0.0.0"
summary: SSH Bastion — secure tunnel & port-forward manager
description: |
  Bhadrakote is a desktop app for managing SSH tunnels through bastion/jump
  hosts. Save connection profiles, configure port-forwarding rules, and
  connect or disconnect with a single click.

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  bhadrakote:
    command: usr/bin/bhadrakote
    desktop: usr/share/applications/bhadrakote.desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - home
      - ssh-keys

parts:
  bhadrakote:
    plugin: dump
    source: .
    override-build: |
      set -eu

      # Install Rust
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      export PATH="$HOME/.cargo/bin:$PATH"

      # Install Node.js 20 via nvm
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
      nvm install 20
      nvm use 20

      # Install frontend dependencies and build the Tauri app
      npm ci
      npm run tauri build -- --bundles deb

      # Extract the .deb into the snap install tree
      dpkg-deb -x src-tauri/target/release/bundle/deb/*.deb "$CRAFT_PART_INSTALL/"
    build-packages:
      - libwebkit2gtk-4.0-dev
      - libappindicator3-dev
      - librsvg2-dev
      - patchelf
      - curl
      - wget
      - file
      - libssl-dev
      - libgtk-3-dev
      - squashfs-tools
    stage-packages:
      - libwebkit2gtk-4.0-37
      - libgtk-3-0
      - openssh-client
